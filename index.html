<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Manufacturing Maintenance Copilot</title>
<style>
  :root {
    --bg: #0f1420; --panel: #161d2e; --panel-2: #1d2740; --border: #2a3652;
    --text: #e8ecf4; --muted: #8a94ab; --accent: #ff8a3d; --accent-2: #4fc3f7;
    --user-bubble: #2a3652; --bot-bubble: #1d2740; --tool-bg: #14251f; --tool-border: #2e5c47;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height:100vh; display:flex; }
  #sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; overflow-y:auto; }
  #sidebar h1 { font-size: 16px; margin:0 0 4px; color: var(--accent); }
  #sidebar .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  #sidebar h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 18px 0 8px; }
  #sidebar ul { list-style:none; padding:0; margin:0; font-size: 13px; }
  #sidebar li { padding: 6px 0; color: var(--accent-2); border-bottom: 1px solid var(--border); }
  #upload-box { margin-top: 14px; }
  #upload-box input { font-size: 11px; color: var(--muted); }
  #main { flex:1; display:flex; flex-direction:column; }
  #chat { flex:1; overflow-y:auto; padding: 24px; display:flex; flex-direction:column; gap: 14px; }
  .msg { max-width: 720px; padding: 12px 16px; border-radius: 10px; line-height:1.5; font-size:14px; white-space: pre-wrap; }
  .msg.user { align-self:flex-end; background: var(--user-bubble); }
  .msg.bot { align-self:flex-start; background: var(--bot-bubble); border: 1px solid var(--border); }
  .msg.system { align-self:center; color: var(--muted); font-size: 12px; }
  .trace { align-self:flex-start; max-width: 720px; background: var(--tool-bg); border: 1px solid var(--tool-border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #9fd6b8; font-family: 'SF Mono', Consolas, monospace; }
  .trace summary { cursor: pointer; color: #7fbf9c; }
  #inputRow { display:flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); background: var(--panel); }
  #inputRow input { flex:1; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-size: 14px; }
  #inputRow button { padding: 12px 20px; border-radius: 8px; border:none; background: var(--accent); color:#1a1200; font-weight:600; cursor:pointer; }
  #inputRow button:disabled { opacity:.5; cursor:default; }
  .quick { display:flex; flex-wrap:wrap; gap:8px; padding: 0 24px 12px; }
  .quick button { background: var(--panel-2); border:1px solid var(--border); color: var(--accent-2); border-radius:16px; padding: 6px 12px; font-size:12px; cursor:pointer; }
  #status { font-size: 11px; color: var(--muted); margin-left: 6px; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>🛠️ Maintenance Copilot</h1>
  <div class="sub">RAG + tool-use over manuals, logs & parts</div>

  <h2>Base URL</h2>
  <input id="baseUrl" value="http://localhost:8000" style="width:100%; padding:6px; background:var(--panel-2); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:12px;" />

  <h2>Indexed Manuals</h2>
  <ul id="manualList"><li>loading…</li></ul>

  <div id="upload-box">
    <h2>Upload Manual (.txt/.md)</h2>
    <input type="file" id="fileInput" accept=".txt,.md" />
  </div>

  <h2>Sample Machines</h2>
  <ul>
    <li>HP-450-07 — Hydraulic Press</li>
    <li>HP-450-03 — Hydraulic Press</li>
    <li>VM200-11 — CNC Mill</li>
  </ul>
</div>

<div id="main">
  <div id="chat"></div>
  <div class="quick" id="quickButtons"></div>
  <div id="inputRow">
    <input id="msgInput" placeholder="e.g. HP-450-07 is throwing E-101, what should I check?" />
    <button id="sendBtn">Send</button>
    <span id="status"></span>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const baseUrlEl = document.getElementById('baseUrl');
let sessionId = null;

function baseUrl() { return baseUrlEl.value.replace(/\/$/, ''); }

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTrace(trace) {
  if (!trace || !trace.length) return;
  const d = document.createElement('details');
  d.className = 'trace';
  const s = document.createElement('summary');
  s.textContent = `🔧 ${trace.length} tool call(s): ` + trace.map(t => t.tool).join(', ');
  d.appendChild(s);
  const pre = document.createElement('pre');
  pre.style.whiteSpace = 'pre-wrap';
  pre.style.marginTop = '8px';
  pre.textContent = JSON.stringify(trace, null, 2);
  d.appendChild(pre);
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function send(text) {
  if (!text.trim()) return;
  addMsg('user', text);
  inputEl.value = '';
  sendBtn.disabled = true;
  statusEl.textContent = 'thinking…';
  try {
    const res = await fetch(baseUrl() + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text})
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    sessionId = data.session_id;
    addTrace(data.tool_trace);
    addMsg('bot', data.reply);
  } catch (e) {
    addMsg('system', 'Error: ' + e.message + ' — is the backend running at ' + baseUrl() + '?');
  } finally {
    sendBtn.disabled = false;
    statusEl.textContent = '';
  }
}

sendBtn.addEventListener('click', () => send(inputEl.value));
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(inputEl.value); });

const quickPrompts = [
  "HP-450-07 is throwing E-101, tonnage seems low. What should I check?",
  "What's causing ALM-407 on VM200-11 and what part do I need?",
  "Give me the monthly PM checklist for the CNC mill",
  "Show me all past incidents on Hydraulic Press HP-450"
];
const qb = document.getElementById('quickButtons');
quickPrompts.forEach(p => {
  const b = document.createElement('button');
  b.textContent = p.length > 40 ? p.slice(0,40)+'…' : p;
  b.title = p;
  b.onclick = () => send(p);
  qb.appendChild(b);
});

async function loadManuals() {
  try {
    const res = await fetch(baseUrl() + '/manuals');
    const data = await res.json();
    const ul = document.getElementById('manualList');
    ul.innerHTML = '';
    data.sources.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s;
      ul.appendChild(li);
    });
  } catch (e) {
    document.getElementById('manualList').innerHTML = '<li style="color:#c66">backend offline</li>';
  }
}
loadManuals();

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  statusEl.textContent = 'indexing manual…';
  try {
    await fetch(baseUrl() + '/upload_manual', { method: 'POST', body: fd });
    await loadManuals();
    addMsg('system', `Indexed new manual: ${file.name}`);
  } catch (err) {
    addMsg('system', 'Upload failed: ' + err.message);
  }
  statusEl.textContent = '';
});

addMsg('system', 'Connected to Manufacturing Maintenance Copilot. Ask about a fault code, machine, or maintenance procedure.');
</script>
</body>
</html>
